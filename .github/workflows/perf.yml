name: Performance

on:
  pull_request:
    branches: [master]
    paths:
      - 'src/**'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/perf.yml'
      - 'reassure-tests.sh'
      - 'dangerfile.js'

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  measure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Run Reassure (baseline + current)
        run: ./reassure-tests.sh

      - name: Post perf report as PR comment
        run: npx --yes danger@13 ci --failOnErrors
        env:
          DANGER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
