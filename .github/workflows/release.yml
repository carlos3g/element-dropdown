name: Release
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 24 ships with npm 11, which is required for Trusted Publishing
      # (npm >= 11.5.1). Node 22.x currently ships with npm 10, and trying to
      # self-upgrade npm 10 → npm latest fails on hosted runners with a
      # MODULE_NOT_FOUND on 'promise-retry' mid-install.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: |
          yarn install --cwd example --frozen-lockfile
          yarn install --frozen-lockfile

      - name: Build package
        run: yarn prepack

      - name: Publish to npm
        run: npm publish --access public --provenance
