name: Setup
description: Setup Node.js and install dependencies (Yarn 4 via corepack)

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc

    - name: Enable Corepack (Yarn 4)
      run: corepack enable
      shell: bash

    - name: Get Yarn cache location
      id: yarn-cache-dir
      run: echo "dir=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Cache Yarn global cache and node_modules
      uses: actions/cache@v4
      with:
        path: |
          ${{ steps.yarn-cache-dir.outputs.dir }}
          **/node_modules
        key: ${{ runner.os }}-yarn4-${{ hashFiles('**/yarn.lock', '**/package.json') }}
        restore-keys: |
          ${{ runner.os }}-yarn4-

    - name: Install example dependencies
      run: yarn install --immutable
      shell: bash
      working-directory: example

    - name: Install root dependencies
      run: yarn install --immutable
      shell: bash
